name: bbsolver CI

on:
  workflow_dispatch:
  # Automatic CI is intentionally disabled to avoid consuming GitHub-hosted
  # runner minutes. Run this workflow manually only when remote validation is
  # explicitly needed.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clangd

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DBBSOLVER_BUILD_TESTS=ON
          -DBBSOLVER_FORCE_THIRD_PARTY_ARCHIVES=ON
          -DBBSOLVER_ENABLE_REMOTE_PROBES=OFF

      - name: Build
        run: cmake --build build --parallel 4

      - name: Fast unit tests
        run: ctest --test-dir build -C Release -L unit -LE slow --output-on-failure -j 4

      - name: Solver policies
        run: |
          for policy in tests/policies/*_policy.py; do
            python3 "$policy"
          done

      - name: Package smoke
        run: |
          cmake --install build --prefix "${RUNNER_TEMP}/bbsolver-install"
          cmake -S tests/package_smoke -B build-package-smoke \
            -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/bbsolver-install" \
            -DBBSOLVER_FORCE_BUNDLED_DEPS=ON
          cmake --build build-package-smoke --parallel 4
          ./build-package-smoke/bbsolver_package_smoke

      - name: Incremental standalone validator
        run: >
          python3 scripts/validate_standalone_package.py
          --mode incremental
          --skip-configure
          --build-dir build
          --ctest-label unit
          --clangd-jobs 4

  package-macos:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DBBSOLVER_BUILD_TESTS=ON
          -DBBSOLVER_FORCE_THIRD_PARTY_ARCHIVES=ON
          -DBBSOLVER_ENABLE_REMOTE_PROBES=OFF

      - name: Build
        run: cmake --build build --parallel 4

      - name: Fast unit tests
        run: ctest --test-dir build -C Release -L unit -LE slow --output-on-failure -j 4

      - name: Install and package smoke
        run: |
          cmake --install build --prefix "${RUNNER_TEMP}/bbsolver-install"
          cmake -S tests/package_smoke -B build-package-smoke \
            -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/bbsolver-install" \
            -DBBSOLVER_FORCE_BUNDLED_DEPS=ON
          cmake --build build-package-smoke --parallel 4
          ./build-package-smoke/bbsolver_package_smoke

  package-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Configure
        shell: cmd
        run: cmake -S . -B build -DBBSOLVER_BUILD_TESTS=ON -DBBSOLVER_FORCE_THIRD_PARTY_ARCHIVES=ON -DBBSOLVER_ENABLE_REMOTE_PROBES=OFF

      - name: Build
        shell: cmd
        run: cmake --build build --config Release --parallel 4

      - name: Fast unit tests
        shell: cmd
        run: ctest --test-dir build -C Release -L unit -LE slow --output-on-failure -j 4

      - name: Install and package smoke
        shell: cmd
        run: |
          cmake --install build --config Release --prefix %RUNNER_TEMP%\bbsolver-install
          cmake -S tests\package_smoke -B build-package-smoke -DCMAKE_PREFIX_PATH=%RUNNER_TEMP%\bbsolver-install -DBBSOLVER_FORCE_BUNDLED_DEPS=ON
          cmake --build build-package-smoke --config Release --parallel 4
          build-package-smoke\Release\bbsolver_package_smoke.exe

  release-validation:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clangd

      - name: Clean standalone release validator
        run: python3 scripts/validate_standalone_package.py --jobs 4 --clangd-jobs 4 --generator Ninja
